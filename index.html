    <header>

            <section class="logo" id="site-logo">LOGO</section>
            <section class="user-input">

                    <span class="icon fa fa-chevron-down"></span>
                    <section class="country-names">
                        <input type="radio" name="country-list" value="INDIA">
                        <input type="radio" name="country-list" value="US">

                        <input type="radio" name="country-list" value="AUSTRALIA">

                        <input type="radio" name="country-list" value="CANADA">

                        <input type="radio" name="country-list" value="GERMANY">
                        <input type="radio" name="country-list" value="ITALY">
                        <input type="radio" name="country-list" value="SINGAPORE">
                        <input type="radio" name="country-list" value="INDONESIA">
                    </section>
                </section>
            </section>
            <section class="small-device-menu-bar">
                <input type="checkbox" id="mobile-navigation-activation" checked>
                <span _1></span>
                <span _2></span>
